<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0E141F">
<title>Offline, True Hybrid</title>
<link rel="stylesheet" href="/assets/styles.css">
<style>
  body { margin:0; background:var(--paper); color:var(--char);
    font-family:var(--body, system-ui, sans-serif);
    min-height:100vh; display:flex; align-items:center; justify-content:center; padding:32px; }
  .off { max-width:460px; text-align:center; }
  .off .true { font-family:var(--body); font-weight:700; font-size:12px; letter-spacing:0.5em; text-transform:lowercase; color:var(--brass-dim); }
  .off h1 { font-family:var(--display, Georgia, serif); color:var(--ink); margin:6px 0 14px; }
  .off p { line-height:1.6; color:var(--char); }
  .off a { display:inline-block; margin-top:18px; padding:12px 22px; background:var(--brass);
    color:var(--ink); text-decoration:none; font-weight:700; border-radius:4px; }
</style>
</head>
<body>
  <div class="off">
    <div class="true">true hybrid</div>
    <h1>You're offline</h1>
    <p>This page hasn't been saved for offline use yet. Reconnect and it'll load normally, any page or tool you've already opened will keep working without a connection.</p>
    <a href="/">Back to True Hybrid</a>
  </div>
</body>
</html>
