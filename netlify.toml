# Netlify configuration for True Hybrid Nutrition
# Pure static site, no build step required.

[build]
  publish = "."

# Old site URLs no longer exist. Send any lingering bookmarks or links
# to the nutrition tool instead of a 404.
[[redirects]]
  from = "/framework/*"
  to = "/"
  status = 301

[[redirects]]
  from = "/vanguard/*"
  to = "/"
  status = 301

[[redirects]]
  from = "/downloads/*"
  to = "/"
  status = 301

[[redirects]]
  from = "/tools/*"
  to = "/"
  status = 301

# Security & caching headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/data/*"
  [headers.values]
    Cache-Control = "public, max-age=300"

# Service worker must be re-checked often so updates roll out to installed apps
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Correct content type for the web app manifest
[[headers]]
  for = "/manifest.webmanifest"
  [headers.values]
    Content-Type = "application/manifest+json"
